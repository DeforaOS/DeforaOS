package=GServer
version=git
targets=build,configure,download,deforaos-gserver.pc,extract,patch,sbom,sbominstall,tests
dist=Makefile,config.sh
config=sh

[metadata]
description=DeforaOS Graphics Server
copyright=(c) 2004-2026 The DeforaOS Project
license=GPL-3.0-only
homepage=https://git.defora.org/DeforaOS/GServer
download=https://ftp.defora.org/pub/DeforaOS/Apps/Graphics/src/GServer
maintainer=khorben
depends=deforaos-libapp.pc

#targets
#phony
[build]
type=script
script=../../../../System/src/script.sh
phony=1
depends=configure
install=

[configure]
type=script
script=../../../../System/src/script.sh
phony=1
enabled=0
depends=patch

[download]
type=script
script=../../../../System/src/script.sh
flags=-O URL=https://git.defora.org/DeforaOS/$(PACKAGE).git
phony=1
enabled=0

[extract]
type=script
script=../../../../System/src/script.sh
phony=1
enabled=0
depends=download

[patch]
type=script
script=../../../../System/src/script.sh
phony=1
enabled=0
depends=extract

[sbom]
type=script
script=../../../../System/src/script.sh
phony=1
enabled=0
depends=$(OBJDIR)deforaos-gserver.pc

[sbominstall]
type=script
script=../../../../System/src/script.sh
phony=1
enabled=0
depends=sbom

[tests]
type=script
script=../../../../System/src/script.sh
phony=1
enabled=0
depends=patch

#files
[deforaos-gserver.pc]
type=script
script=../script.sh
enabled=0
depends=project.conf
