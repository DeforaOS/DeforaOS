package=inetd
version=git
targets=build,configure,deforaos-inetd.pc,download,extract,patch,sbom,sbominstall,tests
dist=Makefile,config.sh
config=sh

[metadata]
description=DeforaOS Server inetd
copyright=(c) 2005-2026 The DeforaOS Project
license=GPL-3.0-only
homepage=https://git.defora.org/DeforaOS/inetd
download=https://ftp.defora.org/pub/DeforaOS/Apps/Servers/src/inetd
maintainer=khorben

#targets
#phony
[build]
type=script
script=../../../../System/src/script.sh
phony=1
depends=configure
install=

[configure]
type=script
script=../../../../System/src/script.sh
phony=1
enabled=0
depends=patch

[download]
type=script
script=../../../../System/src/script.sh
flags=-O URL=https://git.defora.org/DeforaOS/$(PACKAGE).git
phony=1
enabled=0

[extract]
type=script
script=../../../../System/src/script.sh
phony=1
enabled=0
depends=download

[patch]
type=script
script=../../../../System/src/script.sh
phony=1
enabled=0
depends=extract

[sbom]
type=script
script=../../../../System/src/script.sh
phony=1
enabled=0
depends=$(OBJDIR)deforaos-inetd.pc

[sbominstall]
type=script
script=../../../../System/src/script.sh
phony=1
enabled=0
depends=sbom

[tests]
type=script
script=../../../../System/src/script.sh
phony=1
enabled=0
depends=patch

#files
[deforaos-inetd.pc]
type=script
script=../../../../System/src/script.sh
enabled=0
depends=project.conf
