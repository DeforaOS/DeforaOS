package=C99
version=git
targets=build,configure,deforaos-c99.pc,download,extract,patch,sbom,sbominstall,tests
dist=Makefile,config.sh
config=sh

[metadata]
description=DeforaOS Devel C compiler
copyright=(c) 2006-2026 The DeforaOS Project
license=GPL-3.0-only
homepage=https://git.defora.org/DeforaOS/C99
download=https://ftp.defora.org/pub/DeforaOS/Apps/Devel/src/C99/
maintainer=khorben
depends=deforaos-asm,deforaos-cpp

#targets
#phony
[build]
type=script
script=../../../../System/src/script.sh
phony=1
depends=configure
install=

[configure]
type=script
script=../../../../System/src/script.sh
phony=1
enabled=0
depends=patch

[download]
type=script
script=../../../../System/src/script.sh
flags=-O URL=https://git.defora.org/DeforaOS/$(PACKAGE).git
phony=1
enabled=0

[extract]
type=script
script=../../../../System/src/script.sh
phony=1
enabled=0
depends=download

[patch]
type=script
script=../../../../System/src/script.sh
phony=1
enabled=0
depends=extract

[sbom]
type=script
script=../../../../System/src/script.sh
phony=1
enabled=0
depends=$(OBJDIR)deforaos-c99.pc

[sbominstall]
type=script
script=../../../../System/src/script.sh
phony=1
enabled=0
depends=sbom

[tests]
type=script
script=../../../../System/src/script.sh
phony=1
enabled=0
depends=patch

#files
[deforaos-c99.pc]
type=script
script=../../../../System/src/script.sh
enabled=0
depends=project.conf
