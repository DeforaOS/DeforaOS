name: DeforaOS SBOM (ubuntu-latest)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bomtool gcc make
    - name: Bootstrap
      run: make bootstrap < /dev/null
    - name: Generate SBOM files
      run: make DESTDIR="$PWD/destdir" sbominstall
