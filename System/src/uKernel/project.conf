package=uKernel
version=git
targets=build,configure,deforaos-ukernel.pc,download,extract,patch,sbom,sbominstall,tests
dist=Makefile,config.sh
config=sh

[metadata]
description=DeforaOS System uKernel
copyright=(c) 2018-2026 The DeforaOS Project
license=BSD-2-Clause
homepage=https://git.defora.org/DeforaOS/uKernel
download=https://ftp.defora.org/pub/DeforaOS/System/src/uKernel/
maintainer=khorben
#XXX circular dependency of sorts
#depends=deforaos-libc

#targets
#phony
[build]
type=script
script=../script.sh
phony=1
depends=configure
install=

[configure]
type=script
script=../script.sh
phony=1
depends=patch

[download]
type=script
script=../script.sh
flags=-O URL=https://git.defora.org/DeforaOS/$(PACKAGE).git
phony=1

[extract]
type=script
script=../script.sh
phony=1
depends=download

[patch]
type=script
script=../script.sh
phony=1
depends=extract

[sbom]
type=script
script=../script.sh
phony=1
enabled=0
depends=$(OBJDIR)deforaos-ukernel.pc

[sbominstall]
type=script
script=../script.sh
phony=1
enabled=0
depends=sbom

[tests]
type=script
script=../script.sh
phony=1
enabled=0
depends=patch

#files
[deforaos-ukernel.pc]
type=script
script=../script.sh
enabled=0
depends=project.conf
